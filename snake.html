<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>지렁이 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    #info {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    #info span { color: #a8dadc; font-weight: bold; }
    canvas {
      border: 3px solid #e94560;
      border-radius: 4px;
      background: #16213e;
    }
    #msg {
      margin-top: 14px;
      font-size: 1rem;
      color: #a8dadc;
    }
    #difficulty {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    #difficulty button {
      padding: 6px 18px;
      border: 2px solid #e94560;
      border-radius: 20px;
      background: transparent;
      color: #eee;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #difficulty button.active {
      background: #e94560;
      color: #fff;
      font-weight: bold;
    }
    #difficulty button:hover:not(.active) {
      background: rgba(233,69,96,0.2);
    }
  </style>
</head>
<body>
  <h1>지렁이 게임</h1>
  <div id="info">
    점수: <span id="score">0</span>
    &nbsp;|&nbsp;
    최고: <span id="best">0</span>
  </div>
  <div id="difficulty">
    <button data-speed="200" onclick="setDifficulty(this)">쉬움</button>
    <button data-speed="130" onclick="setDifficulty(this)" class="active">보통</button>
    <button data-speed="70"  onclick="setDifficulty(this)">어려움</button>
    <button data-speed="40"  onclick="setDifficulty(this)">지옥</button>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">방향키로 조작 &nbsp;|&nbsp; Space 로 시작/일시정지</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const TILE = 20;
    const COLS = canvas.width / TILE;
    const ROWS = canvas.height / TILE;

    let snake, dir, nextDir, food, score, best, state, loop;
    let speed = 130; // ms per tick

    function setDifficulty(btn) {
      speed = parseInt(btn.dataset.speed);
      document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // 게임 중이면 속도 즉시 반영
      if (state === 'playing') {
        clearInterval(loop);
        loop = setInterval(update, speed);
      }
    }

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      best = best || 0;
      state = 'idle'; // idle, playing, paused, dead
      placeFood();
      render();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function update() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 벽 충돌
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        die(); return;
      }
      // 자기 몸 충돌
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        die(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        document.getElementById('score').textContent = score;
        document.getElementById('best').textContent = best;
        placeFood();
      } else {
        snake.pop();
      }
      render();
    }

    function die() {
      state = 'dead';
      clearInterval(loop);
      render();
      document.getElementById('msg').textContent = '게임 오버! Space 로 재시작';
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 격자
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
        }
      }

      // 먹이
      ctx.fillStyle = '#f72585';
      ctx.beginPath();
      ctx.arc(
        food.x * TILE + TILE / 2,
        food.y * TILE + TILE / 2,
        TILE / 2 - 2, 0, Math.PI * 2
      );
      ctx.fill();

      // 지렁이
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = `hsl(140, 70%, ${30 + ratio * 30}%)`;
        ctx.fillRect(seg.x * TILE + 1, seg.y * TILE + 1, TILE - 2, TILE - 2);
      });

      // 머리 눈
      const h = snake[0];
      ctx.fillStyle = '#fff';
      const ex = dir.x === 0 ? [4, TILE - 6] : (dir.x > 0 ? [TILE - 7, TILE - 7] : [4, 4]);
      const ey = dir.y === 0 ? [4, 4] : (dir.y > 0 ? [TILE - 7, TILE - 7] : [4, 4]);
      ctx.fillRect(h.x * TILE + ex[0], h.y * TILE + ey[0], 3, 3);
      ctx.fillRect(h.x * TILE + ex[1], h.y * TILE + ey[1], 3, 3);

      // 오버레이
      if (state === 'idle') {
        overlay('Space 를 눌러 시작!');
      } else if (state === 'paused') {
        overlay('일시 정지');
      } else if (state === 'dead') {
        overlay('GAME OVER\n점수: ' + score);
      }
    }

    function overlay(text) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px Segoe UI';
      ctx.textAlign = 'center';
      const lines = text.split('\n');
      lines.forEach((line, i) => {
        ctx.fillText(line, canvas.width / 2, canvas.height / 2 + i * 34 - (lines.length - 1) * 17);
      });
    }

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; e.preventDefault(); break;
        case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y:  1 }; e.preventDefault(); break;
        case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; e.preventDefault(); break;
        case 'ArrowRight': if (dir.x !== -1) nextDir = { x:  1, y: 0 }; e.preventDefault(); break;
        case ' ':
          e.preventDefault();
          if (state === 'idle' || state === 'dead') {
            init();
            state = 'playing';
            document.getElementById('msg').textContent = '방향키로 조작  |  Space 로 일시정지';
            loop = setInterval(update, speed);
          } else if (state === 'playing') {
            state = 'paused';
            clearInterval(loop);
            render();
            document.getElementById('msg').textContent = 'Space 로 재개';
          } else if (state === 'paused') {
            state = 'playing';
            document.getElementById('msg').textContent = '방향키로 조작  |  Space 로 일시정지';
            loop = setInterval(update, speed);
          }
          break;
      }
    });

    init();
  </script>
</body>
</html>
