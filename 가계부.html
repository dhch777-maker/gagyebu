<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #2d3748;
      margin-bottom: 24px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* 요약 카드 */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card .label {
      font-size: 0.75rem;
      color: #718096;
      margin-bottom: 6px;
    }

    .card .amount {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .card.income .amount { color: #38a169; }
    .card.expense .amount { color: #e53e3e; }
    .card.balance .amount { color: #3182ce; }

    /* 입력 폼 */
    .form {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .form h2 {
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      min-width: 120px;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row select:focus {
      border-color: #63b3ed;
    }

    .form-row input[type="number"] { max-width: 160px; }
    .form-row input[type="date"] { max-width: 160px; }

    .btn-add {
      width: 100%;
      padding: 11px;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #2b6cb0; }

    /* 목록 */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-header h2 { font-size: 1rem; color: #2d3748; }

    .filter-select {
      padding: 6px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #4a5568;
      outline: none;
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transaction-item {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .transaction-info .desc {
      font-weight: 600;
      color: #2d3748;
      font-size: 0.95rem;
    }

    .transaction-info .meta {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 3px;
    }

    .transaction-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .transaction-amount {
      font-weight: 700;
      font-size: 1rem;
    }

    .transaction-amount.income { color: #38a169; }
    .transaction-amount.expense { color: #e53e3e; }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .btn-delete:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>가계부</h1>

    <!-- 요약 -->
    <div class="summary">
      <div class="card income">
        <div class="label">총 수입</div>
        <div class="amount" id="totalIncome">0원</div>
      </div>
      <div class="card expense">
        <div class="label">총 지출</div>
        <div class="amount" id="totalExpense">0원</div>
      </div>
      <div class="card balance">
        <div class="label">잔액</div>
        <div class="amount" id="balance">0원</div>
      </div>
    </div>

    <!-- 입력 폼 -->
    <div class="form">
      <h2>내역 추가</h2>
      <div class="form-row">
        <input type="text" id="desc" placeholder="내용 (예: 점심식사)" />
        <input type="number" id="amount" placeholder="금액" min="0" />
      </div>
      <div class="form-row">
        <select id="type">
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
        <select id="category">
          <option value="식비">식비</option>
          <option value="교통">교통</option>
          <option value="쇼핑">쇼핑</option>
          <option value="문화">문화</option>
          <option value="의료">의료</option>
          <option value="급여">급여</option>
          <option value="기타">기타</option>
        </select>
        <input type="date" id="date" />
      </div>
      <button class="btn-add" onclick="addTransaction()">+ 추가</button>
    </div>

    <!-- 목록 -->
    <div class="list-header">
      <h2>거래 내역</h2>
      <select class="filter-select" id="filter" onchange="render()">
        <option value="all">전체</option>
        <option value="income">수입만</option>
        <option value="expense">지출만</option>
      </select>
    </div>
    <div class="transaction-list" id="list"></div>
  </div>

  <script>
    // 오늘 날짜 기본값
    document.getElementById('date').value = new Date().toISOString().slice(0, 10);

    let transactions = JSON.parse(localStorage.getItem('kgb_transactions') || '[]');

    function save() {
      localStorage.setItem('kgb_transactions', JSON.stringify(transactions));
    }

    function fmt(n) {
      return Number(n).toLocaleString('ko-KR') + '원';
    }

    function addTransaction() {
      const desc = document.getElementById('desc').value.trim();
      const amount = parseInt(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      const category = document.getElementById('category').value;
      const date = document.getElementById('date').value;

      if (!desc) { alert('내용을 입력하세요.'); return; }
      if (!amount || amount <= 0) { alert('올바른 금액을 입력하세요.'); return; }
      if (!date) { alert('날짜를 선택하세요.'); return; }

      transactions.unshift({ id: Date.now(), desc, amount, type, category, date });
      save();
      render();

      document.getElementById('desc').value = '';
      document.getElementById('amount').value = '';
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    }

    function render() {
      const filter = document.getElementById('filter').value;
      const filtered = filter === 'all' ? transactions : transactions.filter(t => t.type === filter);

      // 요약 계산 (필터 무관하게 전체 기준)
      const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

      document.getElementById('totalIncome').textContent = fmt(totalIncome);
      document.getElementById('totalExpense').textContent = fmt(totalExpense);
      document.getElementById('balance').textContent = fmt(totalIncome - totalExpense);

      const list = document.getElementById('list');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">내역이 없습니다.</div>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="transaction-item">
          <div class="transaction-info">
            <div class="desc">${escHtml(t.desc)}</div>
            <div class="meta">${t.date} · ${t.category}</div>
          </div>
          <div class="transaction-right">
            <span class="transaction-amount ${t.type}">
              ${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}
            </span>
            <button class="btn-delete" onclick="deleteTransaction(${t.id})" title="삭제">✕</button>
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
